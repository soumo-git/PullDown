name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Rust compile check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: Verify bundled runtime assets
        shell: pwsh
        run: |
          $required = @(
            "src-tauri/engines/windows/yt-dlp.exe",
            "src-tauri/engines/windows/ffmpeg.exe",
            "src-tauri/resources/vlc/windows/vlc.exe",
            "src-tauri/resources/vlc/windows/libvlc.dll"
          )
          $missing = @()
          foreach ($path in $required) {
            if (-not (Test-Path $path)) { $missing += $path }
          }
          if ($missing.Count -gt 0) {
            Write-Error ("Missing required bundled assets:`n - " + ($missing -join "`n - "))
            exit 1
          }
